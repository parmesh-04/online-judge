# Purpose: CI Pipeline — runs linting, smoke tests, and Docker build verification.
# Triggers on every push and on pull requests to main.

name: CI Pipeline

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Smoke Test
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache backend node_modules
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: backend-${{ hashFiles('backend/package-lock.json') }}

      - name: Cache compiler node_modules
        uses: actions/cache@v4
        with:
          path: compiler/node_modules
          key: compiler-${{ hashFiles('compiler/package-lock.json') }}

      - name: Cache frontend node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: frontend-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Install compiler dependencies
        run: cd compiler && npm ci

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Lint backend
        run: cd backend && npx eslint . --ext .js --max-warnings 100 || true
        continue-on-error: true

      - name: Lint compiler
        run: cd compiler && npx eslint . --ext .js --max-warnings 100 || true
        continue-on-error: true

      - name: Lint frontend
        run: cd frontend && npm run lint || true
        continue-on-error: true

      - name: Smoke test backend
        env:
          MONGO_URI: mongodb://localhost:27017/online-judge-test
          JWT_SECRET: ci-test-jwt-secret-key-32chars-min
          GEMINI_API_KEY: test-gemini-api-key-placeholder
          JUDGE_SERVICE_KEY: ci-internal-judge-service-key
          PORT: 5000
          NODE_ENV: test
          DOTENV_CONFIG_PATH: /dev/null
        run: |
          cd backend
          node server.js &
          SERVER_PID=$!
          sleep 8

          # Retry health check up to 15 times
          for i in $(seq 1 15); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/api/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed on attempt $i"
              kill $SERVER_PID 2>/dev/null || true
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying..."
            sleep 2
          done

          echo "❌ Health check failed after 15 attempts"
          kill $SERVER_PID 2>/dev/null || true
          exit 1

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        run: docker build -t online-judge-frontend ./frontend

      - name: Build backend image
        run: docker build -t online-judge-backend ./backend

      - name: Build compiler image
        run: docker build -t online-judge-compiler ./compiler

      - name: Start stack with docker-compose
        run: |
          # Create minimal .env files for the test
          echo "MONGO_URI=mongodb://mongodb:27017/online-judge" > backend/.env
          echo "JWT_SECRET=ci-test-secret" >> backend/.env
          echo "GEMINI_API_KEY=test-key" >> backend/.env
          echo "FRONTEND_URL=http://localhost:3000" >> backend/.env

          docker-compose up -d
          echo "Waiting 30 seconds for services to start..."
          sleep 30

      - name: Verify health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/api/health || true)
          if [ "$STATUS" = "200" ]; then
            echo "✅ Stack health check passed"
          else
            echo "❌ Stack health check failed (status: $STATUS)"
            docker-compose logs --tail=50
            exit 1
          fi

      - name: Tear down stack
        if: always()
        run: docker-compose down
