# CI Pipeline — Lint, smoke test, and Docker image build verification.
# Triggers on every push and on all pull requests to main.

name: CI Pipeline

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Lint + Backend Smoke Test
  # ─────────────────────────────────────────────
  lint-and-test:
    name: Lint & Smoke Test
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        # Wait for MongoDB to be ready before running tests
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache backend node_modules
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: backend-${{ hashFiles('backend/package-lock.json') }}

      - name: Cache frontend node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: frontend-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      # Lint steps are advisory only — never block the build
      - name: Lint backend (advisory)
        run: cd backend && npx eslint . --ext .js --max-warnings 100 || true

      - name: Lint frontend (advisory)
        run: cd frontend && npm run lint || true

      # ── The real test: can the backend start and serve traffic? ──
      - name: Smoke test backend
        env:
          NODE_ENV: test
          MONGO_URI: mongodb://127.0.0.1:27017/online-judge-ci
          JWT_SECRET: ci-test-jwt-secret-key-minimum-32-chars
          GEMINI_API_KEY: test-gemini-key-placeholder
          JUDGE_SERVICE_KEY: ci-internal-judge-key
          PORT: 5000
        run: |
          cd backend
          node server.js &
          SERVER_PID=$!

          echo "Waiting for backend to start..."
          sleep 10

          # Retry health check up to 15 times (30 seconds total)
          for i in $(seq 1 15); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:5000/api/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed on attempt $i"
              kill $SERVER_PID 2>/dev/null || true
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 2s..."
            sleep 2
          done

          echo "Health check failed after 15 attempts"
          echo "--- Last server output ---"
          kill $SERVER_PID 2>/dev/null || true
          exit 1

  # ─────────────────────────────────────────────
  # JOB 2: Docker Image Build Verification
  # Only runs after lint-and-test passes
  # ─────────────────────────────────────────────
  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build each image independently — fastest way to catch Dockerfile errors
      - name: Build backend image
        run: docker build -t online-judge-backend ./backend

      - name: Build compiler image
        run: docker build -t online-judge-compiler ./compiler

      - name: Build frontend image
        run: docker build -t online-judge-frontend ./frontend

      - name: Verify all images exist
        run: |
          echo "--- Built images ---"
          docker images | grep online-judge
          echo "All 3 Docker images built successfully"
