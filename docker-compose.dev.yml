# Purpose: Development overrides for docker-compose.
# Adds volume mounts for hot-reload and uses dev commands.
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    environment:
      - NODE_ENV=development

  backend:
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npx nodemon server.js
    environment:
      - NODE_ENV=development

  compiler:
    volumes:
      - ./compiler:/app
      - /app/node_modules
    command: npx nodemon server.js
    environment:
      - NODE_ENV=development
