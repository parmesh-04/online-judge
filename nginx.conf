# ═══════════════════════════════════════════════════════════════════════
# Online Judge — Main nginx reverse proxy configuration
# ═══════════════════════════════════════════════════════════════════════
#
# This file runs ON THE EC2 HOST (not inside Docker).
# It acts as the single entry point routing all traffic:
#   - /api/*        → backend Docker container (port 5000)
#   - /compiler/*   → compiler Docker container (port 8000)
#   - /*            → frontend Docker container (port 3000)
#
# Port 80  → HTTP (redirects to HTTPS if SSL configured)
# Port 443 → HTTPS (uncomment SSL section after certbot setup)
# ═══════════════════════════════════════════════════════════════════════

upstream frontend_upstream {
  server localhost:3000;  # frontend Docker container
}

upstream backend_upstream {
  server localhost:5000;  # backend Docker container
}

server {
  listen 80;
  server_name _;  # accepts any hostname, replace with your domain later

  # ── Security headers applied to all responses ──
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Increase body size limit for code submissions (max 2MB)
  client_max_body_size 2M;

  # ── Route /api/* to backend ──
  location /api/ {
    proxy_pass http://backend_upstream;
    proxy_http_version 1.1;

    # Critical for SSE streaming (AI debug endpoint) — disable buffering
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 300s;  # AI streaming can take time

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection '';
  }

  # ── Route /compiler/* to compiler service ──
  location /compiler/ {
    proxy_pass http://localhost:8000/;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_read_timeout 60s;  # code execution timeout
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # ── Route everything else to React frontend ──
  location / {
    proxy_pass http://frontend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;
  }

  # ── Cache static assets aggressively ──
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
    proxy_pass http://frontend_upstream;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # ── SSL Configuration (uncomment after running certbot) ──
  # listen 443 ssl;
  # ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
  # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
  # include /etc/letsencrypt/options-ssl-nginx.conf;
  # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
